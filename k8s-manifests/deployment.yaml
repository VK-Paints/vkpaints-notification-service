apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deploy
  namespace: vkpaints-dev-ns
spec:
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: notification-service
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: notification-container
        image: ghcr.io/vk-paints/vkpaints-notification-service:v1.0.0
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: notification-config
        - secretRef:
            name: notification-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

        ports:
        - containerPort: 3000
