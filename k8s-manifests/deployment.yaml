apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deploy
  namespace: vkpaints-dev-ns
spec:
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-container
        image: shubha20/vk-paints_notification-service:v1.0.0
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: notification-config
        - secretRef:
            name: notification-secret
        ports:
        - containerPort: 3000